# Static site — no real build step. The Netlify site has a stale publish
# directory ('theme') saved in its UI settings that wins at the deploy stage,
# so the "build" simply copies the site into theme/ and we publish that.
# (A real command is required here: an empty string is treated as absent and
# Netlify falls back to the stale 'npm run build' saved in the UI.)
[build]
publish = "theme"
command = "mkdir -p theme && cp -r index.html css js images theme/"

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "same-origin"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
for = "/images/*"

[headers.values]
Cache-Control = "public, max-age=604800"
